poll_interval_seconds = 10

[[contracts]]
label       = "My Escrow Contract"
contract_id = "CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
network     = "testnet"
webhook_url = "https://hooks.example.com/my-webhook"
# webhook_secret = "my-secret-token"   # optional: sent as X-TxWatch-Secret header

  [[contracts.rules]]
  type          = "LargeTransfer"
  threshold_xlm = 10000

  [[contracts.rules]]
  type           = "AdminFunctionCalled"
  function_names = ["set_admin", "upgrade", "initialize"]

  [[contracts.rules]]
  type = "TransactionFailed"

[[contracts]]
label       = "Mainnet Vault"
contract_id = "CBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB"
network     = "mainnet"
webhook_url = "https://hooks.example.com/vault-webhook"

  [[contracts.rules]]
  type = "AnyTransaction"

  [[contracts.rules]]
  type          = "FunctionCalled"
  function_name = "withdraw"

# Each [[contracts]] block is independent: rules, webhook_url, and network settings
# apply only to that contract. You can define different webhook receivers and alert
# rules per contract, even if they share the same network.
[[contracts]]
label       = "Mainnet Bridge Gateway"
contract_id = "CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC"
# network must be one of: mainnet / testnet / futurenet
network     = "mainnet"
# webhook_url can differ per contract — this allows routing alerts to different endpoints
webhook_url = "https://hooks.example.com/bridge-webhook"
# webhook_secret = "another-secret-token"

  [[contracts.rules]]
  type          = "HighFee"
  threshold_stroops = 100000

  [[contracts.rules]]
  type = "TransactionFailed"
